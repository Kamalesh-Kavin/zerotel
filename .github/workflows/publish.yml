# .github/workflows/publish.yml
#
# Publish workflow — triggers on a git tag that matches v* (e.g. v0.1.0).
#
# Flow:
#   1. Run the full test suite first — never publish a broken release.
#   2. Build the sdist + wheel with `uv build`.
#   3. Publish to PyPI using the PYPI_API_TOKEN repository secret.
#
# Prerequisites (one-time setup):
#   • Go to https://github.com/Kamalesh-Kavin/zerotel/settings/secrets/actions
#   • Add a secret named PYPI_API_TOKEN with your PyPI API token value.
#
# How to release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The tag push fires this workflow automatically.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # matches v0.1.0, v1.2.3, v2.0.0-beta.1, etc.

jobs:
  # ── 1. Run full test suite before publishing ──────────────────────────────
  test:
    name: Tests (pre-publish gate)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev --extra sqlalchemy --extra flask

      - name: Run pytest
        run: uv run pytest -v --tb=short tests/

  # ── 2. Build and publish ──────────────────────────────────────────────────
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # Only publish after ALL test matrix legs pass.
    needs: test

    # Restrict this job to the default environment so secrets are scoped.
    environment:
      name: pypi
      url: https://pypi.org/project/zerotel/

    permissions:
      # Required by PyPI's trusted publisher flow (OIDC) if you switch later.
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # Install only the core package (no dev/test extras needed for building).
      - name: Install package
        run: uv sync

      # `uv build` produces dist/zerotel-<version>.tar.gz and dist/zerotel-<version>-py3-none-any.whl
      - name: Build sdist and wheel
        run: uv build

      # Publish using the classic API-token method.
      # The token is stored in the PYPI_API_TOKEN repository secret.
      # uv publish reads the token from the UV_PUBLISH_TOKEN env var.
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
